version: '3.9'

services:

  # ── PostgreSQL database ───────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: always
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-bc_agent}
      POSTGRES_USER:     ${POSTGRES_USER:-bcagent}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-bcagent}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── FastAPI backend ───────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    depends_on:
      db:
        condition: service_healthy
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-bcagent}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-bc_agent}
      ENVIRONMENT: production
    volumes:
      - backend_data:/app/data

  # ── Nginx + React frontend ────────────────────────────────────────────────
  nginx:
    build:
      context: .
      dockerfile: nginx/Dockerfile
    restart: always
    depends_on:
      - backend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      # Let's Encrypt certs (managed by certbot on the host)
      - /etc/letsencrypt:/etc/letsencrypt:ro
      # Certbot webroot for renewals
      - /var/www/certbot:/var/www/certbot:ro

volumes:
  postgres_data:
  backend_data:
